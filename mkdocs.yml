site_name: pandera-ui
site_description: Swagger-like UI for Pandera dataframe schemas — one command, instant searchable docs for every schema in your project.
site_url: https://darius1223.github.io/pandera-ui/
repo_url: https://github.com/Darius1223/pandera-ui
repo_name: Darius1223/pandera-ui
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - CLI Reference: cli-reference.md
  - Python API: python-api.md
  - Architecture: architecture.md
  - Changelog: changelog.md
