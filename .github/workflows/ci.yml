name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run mypy pandera_ui/

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short --ignore=tests/test_ui.py --cov=pandera_ui --cov-report=term-missing
